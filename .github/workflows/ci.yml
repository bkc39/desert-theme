name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - "27.1"
          - "27.2"
          - "28.1"
          - "28.2"
          - "29.1"
          - "29.2"
          - "29.3"
          - "29.4"
          - "30.1"
    steps:
      - uses: actions/checkout@v4

      - uses: jcs090218/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - uses: emacs-eask/setup-eask@master
        with:
          version: 'snapshot'

      - name: Byte-compile
        run: eask compile

      - name: Lint (checkdoc)
        run: eask lint checkdoc

      - name: Lint (package-lint)
        run: eask lint package
